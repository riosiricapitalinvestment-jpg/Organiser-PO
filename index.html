<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organiser — Ops Tracker</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

:root{
  --ink:#20231f; --paper:#e9e7dd; --paper-raised:#f2f0e6; --rule:#c7c3b3; --rule-soft:#d8d5c7;
  --brass:#0e8fa3; --teal:#33606a; --rust:#a4463b; --muted:#7a7869; --muted-2:#948f7c;
}
*{box-sizing:border-box;}
.tk-root{font-family:'Inter',sans-serif;background:transparent;color:var(--ink);min-height:100vh;}
.tk-app{max-width:1220px;margin:0 auto;background:var(--paper);border:1px solid var(--rule);min-height:640px;display:flex;flex-direction:column;}
.tk-top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;border-bottom:1px solid var(--rule);background:var(--paper-raised);}
.tk-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:baseline;gap:10px;}
.tk-title .tk-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;}
.tk-user-wrap{display:flex;align-items:center;gap:10px;}
.tk-user-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.tk-build-tag{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted-2);letter-spacing:0.02em;border:1px solid var(--rule);padding:2px 6px;border-radius:10px;cursor:help;}
select.tk-select, .tk-btn, input.tk-input, textarea.tk-textarea, input.tk-date{
  font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--rule);background:var(--paper);color:var(--ink);padding:7px 10px;border-radius:2px;
}
select.tk-select{cursor:pointer;}
.tk-btn{cursor:pointer;background:var(--ink);color:var(--paper);border:1px solid var(--ink);font-weight:500;transition:opacity .15s;}
.tk-btn:hover{opacity:0.82;}
.tk-btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--rule);}
.tk-btn.ghost:hover{background:var(--paper-raised);opacity:1;}
.tk-btn.small{padding:4px 8px;font-size:11px;}
.tk-btn.danger{background:var(--rust);border-color:var(--rust);}
.tk-btn.full{width:100%;}
.tk-tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--rule);background:var(--paper);flex-wrap:wrap;}
.tk-tab{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.04em;text-transform:uppercase;padding:11px 4px;margin-right:22px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;user-select:none;}
.tk-tab.active{color:var(--ink);border-bottom-color:var(--brass);}
.tk-content-row{flex:1;display:flex;min-height:0;}
.tk-sidebar{flex:0 0 210px;border-right:1px solid var(--rule);padding:18px 14px;background:var(--paper-raised);}
.tk-sidebar-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:10px;}
.tk-sidebar-item{display:flex;align-items:center;gap:7px;padding:6px 4px 6px 8px;cursor:pointer;font-size:12.5px;border-radius:2px;border-left:3px solid transparent;}
.tk-sidebar-item:hover{background:var(--paper);}
.tk-dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px;}
.tk-dot.active{background:var(--teal);}
.tk-dot.waiting{background:var(--brass);}
.tk-dot.done{background:var(--muted-2);}
.tk-body{flex:1;padding:22px 24px 40px;overflow-x:hidden;}
.tk-quicklog{display:flex;gap:8px;align-items:center;margin-bottom:26px;padding:12px 14px;background:var(--paper-raised);border:1px solid var(--rule-soft);}
.tk-quicklog select{flex:0 0 180px;}
.tk-quicklog input{flex:1;}
.tk-section-label{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--rule-soft);display:flex;justify-content:space-between;align-items:center;}
.tk-action-row{display:flex;align-items:flex-start;gap:10px;padding:8px 4px;border-bottom:1px solid var(--rule-soft);}
.tk-action-row:last-child{border-bottom:none;}
.tk-action-group{border:1px solid var(--rule);border-left-width:4px;padding:4px 12px 4px;margin-bottom:14px;background:var(--paper-raised);}
.tk-action-group .tk-action-row:last-child{border-bottom:none;}
.tk-action-group-header{font-family:'Fraunces',serif;font-weight:600;font-size:14px;padding:9px 2px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid var(--rule-soft);}
.tk-action-group-header .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;}
.tk-action-group-header .count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:400;color:var(--muted);}
.tk-check{width:16px;height:16px;border:1.5px solid var(--muted-2);border-radius:2px;flex:0 0 16px;margin-top:2px;cursor:pointer;background:var(--paper);position:relative;}
.tk-check.done{background:var(--teal);border-color:var(--teal);}
.tk-check.done::after{content:'';position:absolute;left:4px;top:1px;width:5px;height:9px;border-right:2px solid var(--paper);border-bottom:2px solid var(--paper);transform:rotate(40deg);}
.tk-action-text{font-size:13.5px;line-height:1.4;}
.tk-action-proj{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--brass);text-transform:uppercase;letter-spacing:0.04em;margin-right:8px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--rule);text-underline-offset:2px;}
.tk-action-assignee{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--teal);margin-left:8px;}
.tk-action-due{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--rust);margin-left:8px;}
.tk-empty{color:var(--muted);font-size:13px;font-style:italic;padding:10px 4px;}
.tk-two-col{display:grid;grid-template-columns:1.15fr 0.85fr;gap:32px;}
@media (max-width:800px){.tk-two-col{grid-template-columns:1fr;}}
.tk-ledger-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--rule-soft);}
.tk-ledger-del{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;flex:0 0 auto;align-self:flex-start;}
.tk-ledger-del:hover{color:var(--rust);}
.tk-stamp{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.03em;border:1.5px solid var(--brass);color:var(--brass);padding:3px 6px;border-radius:3px;white-space:nowrap;height:fit-content;transform:rotate(var(--tilt,-2deg));text-transform:uppercase;}
.tk-stamp.system{border-color:var(--teal);color:var(--teal);}
.tk-ledger-text{font-size:13px;line-height:1.45;}
.tk-ledger-meta{font-size:10.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.tk-board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
@media (max-width:800px){.tk-board{grid-template-columns:1fr;}}
.tk-col-head{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.tk-card{background:var(--paper-raised);border:1px solid var(--rule);border-left-width:4px;padding:12px 14px;margin-bottom:12px;cursor:pointer;transition:border-color .15s;}
.tk-card:hover{border-color:var(--brass);}
.tk-card-title{font-family:'Fraunces',serif;font-size:15.5px;font-weight:600;margin-bottom:5px;}
.tk-card-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.03em;}
.tk-card-last{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4;}
.tk-card-open{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--brass);margin-top:8px;}
.tk-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;background:var(--paper);border:1px solid var(--rule);padding:3px 8px;border-radius:12px;margin:0 6px 6px 0;}
.tk-chip .x{cursor:pointer;color:var(--muted);font-weight:600;}
.tk-chip .x:hover{color:var(--rust);}
.tk-chip-add{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.tk-chip-choice{font-size:11px;padding:3px 8px;border:1px dashed var(--rule);border-radius:12px;cursor:pointer;color:var(--muted);}
.tk-chip-choice:hover{border-color:var(--brass);color:var(--brass);}
.tk-param-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.tk-param-row input{flex:1;font-size:12.5px;}
.tk-param-row .rm{cursor:pointer;color:var(--muted);font-size:14px;padding:0 4px;}
.tk-param-row .rm:hover{color:var(--rust);}
.tk-brief-box{background:var(--paper-raised);border:1px solid var(--rule-soft);padding:12px;white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.6;max-height:280px;overflow-y:auto;}
.tk-copied{font-size:11px;color:var(--teal);font-family:'IBM Plex Mono',monospace;margin-left:8px;}
.tk-res-group{margin-bottom:20px;}
.tk-res-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--rule-soft);gap:10px;}
.tk-res-name{font-size:13.5px;font-weight:600;}
.tk-res-detail{font-size:12px;color:var(--muted);margin-top:2px;}
.tk-res-used{font-size:10.5px;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;margin-top:4px;}
.tk-overlay{position:fixed;inset:0;background:rgba(20,20,15,0.35);display:flex;justify-content:flex-end;z-index:50;}
.tk-panel{width:min(560px,94vw);background:var(--paper);height:100%;overflow-y:auto;padding:22px 24px 60px;border-left:1px solid var(--rule);}
.tk-panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.tk-panel-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;display:flex;align-items:center;flex:1;}
.tk-panel-title-input{font-family:'Fraunces',serif;font-size:22px;font-weight:600;background:transparent;border:1px solid transparent;border-radius:2px;padding:2px 4px;flex:1;min-width:0;color:var(--ink);}
.tk-panel-title-input:hover{border-color:var(--rule-soft);}
.tk-panel-title-input:focus{border-color:var(--rule);outline:none;background:var(--paper-raised);}
.tk-close{cursor:pointer;font-size:20px;color:var(--muted);background:none;border:none;line-height:1;padding:2px 6px;}
.tk-close:hover{color:var(--ink);}
.tk-status-row{display:flex;gap:8px;align-items:center;margin:10px 0 22px;flex-wrap:wrap;}
.tk-step-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--rule-soft);}
.tk-step-text{font-size:13.5px;flex:1;}
.tk-step-text.done{color:var(--muted);text-decoration:line-through;}
.tk-step-meta{font-size:10px;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.tk-step-inline{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
.tk-step-inline input{font-size:11px;padding:3px 6px;width:110px;}
.tk-step-inline input.tk-date{width:126px;}
.tk-addstep{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.tk-addstep input.tk-input{flex:1;min-width:140px;}
.tk-addstep input.tk-assignee{flex:0 0 110px;}
.tk-addstep input.tk-date{flex:0 0 130px;}
.tk-add-update{display:flex;flex-direction:column;gap:8px;margin:14px 0 20px;}
.tk-add-update textarea{min-height:56px;resize:vertical;}
.tk-note{font-size:11.5px;color:var(--muted);line-height:1.5;border-left:2px solid var(--rule);padding-left:10px;margin-top:24px;}
.tk-modal{position:fixed;inset:0;background:rgba(20,20,15,0.35);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;}
.tk-modal-box{background:var(--paper);border:1px solid var(--rule);padding:20px 22px;width:min(460px,94vw);max-height:88vh;overflow-y:auto;}
.tk-modal-box.wide{width:min(560px,94vw);}
.tk-modal-box h3{font-family:'Fraunces',serif;margin:0 0 12px;font-size:17px;}
.tk-modal-box .tk-field{margin-bottom:14px;display:flex;flex-direction:column;gap:5px;}
.tk-modal-box label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;color:var(--muted);letter-spacing:0.04em;}
.tk-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
.tk-loading{padding:60px 24px;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;}
.tk-oauth-banner{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 24px;font-size:13px;border-bottom:1px solid var(--rule-soft);}
.tk-oauth-banner.good{background:#e4efe6;color:#2c5c3a;}
.tk-oauth-banner.warn{background:#f5eee0;color:#7a5b1e;}
.tk-oauth-banner.bad{background:#f5e4e1;color:var(--rust);}
textarea.tk-textarea{width:100%;font-family:inherit;}
.tk-cal-group{margin-bottom:26px;}
.tk-cal-group.overdue .tk-section-label{color:var(--rust);}
.tk-cal-filter{display:flex;gap:8px;align-items:center;margin-bottom:20px;}
.tk-panel-tabs{display:flex;gap:2px;margin:14px 0 18px;border-bottom:1px solid var(--rule-soft);}
.tk-settings-link{background:none;border:none;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;padding:4px 8px;white-space:nowrap;}
.tk-settings-link:hover{color:var(--ink);}
.tk-panel-tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;padding:8px 4px;margin-right:20px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;user-select:none;}
.tk-panel-tab.active{color:var(--ink);border-bottom-color:var(--brass);}
.tk-box{border:1px solid var(--rule);padding:12px 14px;margin-bottom:16px;background:var(--paper-raised);}
.tk-box-title{font-family:'Fraunces',serif;font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.tk-triage-row{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--rule-soft);}
.tk-triage-row:last-child{border-bottom:none;}
.tk-triage-pill{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;padding:2px 7px;border-radius:10px;cursor:pointer;border:1px solid var(--rule);color:var(--muted);margin-right:4px;}
.tk-triage-pill.active.new{background:var(--muted-2);color:var(--paper);border-color:var(--muted-2);}
.tk-triage-pill.active.pending{background:var(--brass);color:var(--paper);border-color:var(--brass);}
.tk-triage-pill.active.waiting{background:var(--rust);color:var(--paper);border-color:var(--rust);}
.tk-mbx-activity-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12.5px;}
.tk-fullplan-box{background:#dde9f2;border:1px solid #a9c6da;border-left:4px solid #4f7d9c;}
.tk-plan-num{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#3d6a86;flex:0 0 auto;min-width:18px;margin-top:2px;}
.tk-phase-header{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;padding:5px 0 5px 10px;margin:18px 0 8px;border-left:4px solid var(--rule);letter-spacing:-0.01em;}
.tk-phase-header:first-child{margin-top:2px;}
.tk-mbx-badge{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.03em;color:var(--teal);border:1px solid var(--teal);padding:2px 6px;border-radius:10px;margin-left:6px;}
.tk-mbx-badge.warn{color:var(--rust);border-color:var(--rust);}
</style>
</head>

<div id="tk-mount" class="tk-root"><div class="tk-loading">loading ledger…</div></div>

<script>
(function(){

const DEFAULT_USERS = ['You'];
// Update this once the mailbox ingestion backend is chosen — shown as a small note under Mailboxes.
const INGESTION_SYSTEM_LABEL = 'Supabase Edge Function';
// Keep this in sync with whatever schedule is set in Supabase Cron.
const INGESTION_POLL_MINUTES = 5;

  {key:'guideline', label:'Guideline', plural:'Guidelines'},
  {key:'date', label:'Key date', plural:'Key dates'},
  {key:'other', label:'Other', plural:'Other'}
];

// ---------------------------------------------------------------------------
// Supabase wiring — this file talks to the real `organiser` project directly.
// The publishable key is safe to embed client-side by design (Supabase's
// equivalent of the old "anon key") — actual access control is enforced by
// Row Level Security policies on the database side, not by keeping this
// value secret. Never put the sb_secret_... key here.
// ---------------------------------------------------------------------------
// Bumped by hand every time a new version of this file is generated —
// compare this against what's stated in chat to confirm you're not looking
// at a cached copy. Shown in the top bar.
const BUILD_VERSION = '2026-07-10 04:40 UTC';

const SUPABASE_URL = 'https://aaivtuqsxoejpktqsmzu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PkIaGvI112cpvfZBJSlG4A_YmPSP6f2';

// Google OAuth — the client ID is public/safe to embed (only the client
// secret, which lives server-side in the Edge Function, needs protecting).
const GOOGLE_CLIENT_ID = '696960566917-75kc3k9pknnsb1bg7ecj3aerso871k8b.apps.googleusercontent.com';
const GMAIL_REDIRECT_URI = SUPABASE_URL + '/functions/v1/gmail-oauth-callback';
const APPLY_UPDATE_URL = SUPABASE_URL + '/functions/v1/apply-update';
const UPDATE_SECRET = '7zDap7wHovik6rVqHIyQ/s1baq1SIIho';
function buildGoogleAuthUrl(resourceId){
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: GMAIL_REDIRECT_URI,
    response_type: 'code',
    scope: 'https://www.googleapis.com/auth/gmail.readonly',
    access_type: 'offline',
    prompt: 'consent',
    state: resourceId
  });
  return 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

async function sbFetch(path, options={}){
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(options.headers||{})
  };
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {...options, headers});
  if(!res.ok){
    let errText = '';
    try{ errText = await res.text(); }catch(e){}
    throw new Error('Supabase ' + res.status + ': ' + errText);
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
function sbSelect(table, query=''){ return sbFetch(table + (query ? '?' + query : '')); }
function sbInsert(table, rows){
  return sbFetch(table, { method:'POST', headers:{'Prefer':'return=representation'}, body: JSON.stringify(rows) });
}
function sbUpdate(table, query, patch){
  return sbFetch(table + '?' + query, { method:'PATCH', headers:{'Prefer':'return=representation'}, body: JSON.stringify(patch) });
}
function sbDelete(table, query){
  return sbFetch(table + '?' + query, { method:'DELETE' });
}

// Seed content — inserted into Supabase automatically on first run only
// (when the `projects` table is empty), so the live app starts with the
// same real projects already being tracked instead of an empty board.
const SEED_RESOURCES = [

    ]
  },
  {
    key:'ops-dashboard', name:'Email Triage & Ops Dashboard', status:'active',
    params:[{key:'Stack',value:'Supabase + Gmail API'}],
    linkKeys:['medcore'], resourceNames:[],
    steps:[
      {text:'Register Google Cloud project + OAuth client', done:true, doneBy:'You'},
      {text:'Get consent from each mailbox owner', done:true, doneBy:'You'},
      {text:'Stand up accounts/messages/projects/invoices schema', done:true, doneBy:'You'},
      {text:'Wire the dashboard to Supabase', done:true, doneBy:'You'},
      {text:'Write the Gmail OAuth callback + polling Edge Function', done:false}
    ]
  },
  {
    key:'domain-xxx', name:'Project XXX — Domain & Launch', status:'waiting',
    params:[{key:'Domain',value:'projectxxx.com'}],
    linkKeys:[], resourceNames:['Q3 close'],
    steps:[
      {text:'Register domain name', done:true, doneBy:'You'},
      {text:'Point DNS to hosting', done:false},
      {text:'Draft launch email to list', done:false}
    ]
  },
  {
    key:'rentvault', name:'RentVault', status:'active',
    params:[{key:'Integration partner',value:'Safaricom'}],

async function seedIfEmpty(){
  const existing = await sbSelect('projects', 'select=id&limit=1');
  if(existing && existing.length) return;

  const projectIdByKey = {};
  const resourceIdByName = {};

  for(const r of SEED_RESOURCES){
    const [row] = await sbInsert('resources', [{type:r.type, name:r.name, detail:r.detail}]);
    resourceIdByName[r.name] = row.id;
    if(r.type==='mailbox') await sbInsert('mailbox_connections', [{resource_id: row.id, google_account_email: r.name, status:'needs_reauth'}]);
  }

  for(const p of SEED_PROJECTS){
    const [row] = await sbInsert('projects', [{name:p.name, status:p.status}]);
    projectIdByKey[p.key] = row.id;
    if(p.params.length) await sbInsert('project_params', p.params.map(pr=>({project_id:row.id, key:pr.key, value:pr.value})));
    for(const rn of p.resourceNames){
      const rid = resourceIdByName[rn];
      if(rid) await sbInsert('project_resources', [{project_id:row.id, resource_id:rid}]);
    }
    const taskRows = p.steps.map(s=>({
      project_id: row.id, text:s.text, done: !!s.done,
      done_by: s.done ? (s.doneBy||'You') : null,
      done_at: s.done ? new Date().toISOString() : null,
      assignee: s.assignee||null, due_date: s.dueDate||null,
      instructions: s.instructions||null, status_note: s.statusNote||null, context_tag: s.contextTag||null
    }));
    if(taskRows.length) await sbInsert('tasks', taskRows);
    if(SEED_UPDATE_TEXT[p.key]) await sbInsert('updates', [{project_id: row.id, type:'manual', text: SEED_UPDATE_TEXT[p.key], user_name:'You'}]);
  }

  for(const p of SEED_PROJECTS){
    for(const lk of p.linkKeys){
      const a = projectIdByKey[p.key], b = projectIdByKey[lk];
      if(a && b) await sbInsert('project_links', [{project_id:a, linked_project_id:b}]);
    }
  }

  for(const name of SEED_USERS){
    await sbInsert('users', [{name}]).catch(()=>{});
  }
}

async function loadAll(){
  try{
    await seedIfEmpty();

    const [projectsRows, paramsRows, linksRows, resourcesRows, prRows, mbxRows, tasksRows, updatesRows, usersRows] = await Promise.all([
      sbSelect('projects', 'select=*&order=created_at.asc'),
      sbSelect('project_params', 'select=*'),
      sbSelect('project_links', 'select=*'),
      sbSelect('resources', 'select=*'),
      sbSelect('project_resources', 'select=*'),
      sbSelect('mailbox_connections', 'select=*'),
      sbSelect('tasks', 'select=*&order=created_at.asc'),
      sbSelect('updates', 'select=*&order=ts.desc'),
      sbSelect('users', 'select=*&order=created_at.asc')
    ]);

    // Loaded separately: these tables/columns only exist after their
    // respective migrations have run, so a missing one here shouldn't take
    // down everything else — just degrade gracefully until applied.
    try{
      state.invoices = await sbSelect('invoices', 'select=*&order=due_date.asc.nullslast');
    }catch(e){
      console.error('invoices table not available yet', e);
      state.invoices = [];
    }
    let phasesRows = [];
    try{
      phasesRows = await sbSelect('phases', 'select=*&order=order_index.asc');
    }catch(e){
      console.error('phases table not available yet', e);
      phasesRows = [];
    }
    let knowledgeAllRows = [];
    try{
      knowledgeAllRows = await sbSelect('knowledge_entries', 'select=*&order=created_at.desc');
    }catch(e){
      console.error('knowledge_entries table not available yet', e);
      knowledgeAllRows = [];
    }
    state.globalKnowledge = knowledgeAllRows.filter(k=>!k.project_id).map(k=>({id:k.id, title:k.title, content:k.content, source:k.source||'manual'}));

    const mbxByResource = {};
    (mbxRows||[]).forEach(m=> mbxByResource[m.resource_id] = m);
    state.resources = (resourcesRows||[]).map(r=>{
      const merged = {id:r.id, type:r.type, name:r.name, detail:r.detail};
      if(r.type==='mailbox'){
        const m = mbxByResource[r.id];
        merged.status = m ? m.status : 'connected';
        merged.lastChecked = m && m.last_checked ? new Date(m.last_checked).getTime() : null;
      }
      return merged;
    });

    state.updates = (updatesRows||[]).map(u=>({id:u.id, projectId:u.project_id, type:u.type, text:u.text, user:u.user_name, ts: new Date(u.ts).getTime(), sourceResourceId:u.source_resource_id||null}));

    state.users = (usersRows||[]).map(u=>u.name);
    if(!state.users.length) state.users = DEFAULT_USERS.slice();

    const storedCurrentUser = lsGet('organiser-current-user');
    state.currentUser = (storedCurrentUser && state.users.includes(storedCurrentUser)) ? storedCurrentUser : state.users[0];

    state.projects = (projectsRows||[]).map(p=>{
      const params = (paramsRows||[]).filter(x=>x.project_id===p.id).map(x=>({id:x.id, key:x.key||'', value:x.value||''}));
      const links = (linksRows||[]).filter(x=>x.project_id===p.id).map(x=>x.linked_project_id);
      const resourceIds = (prRows||[]).filter(x=>x.project_id===p.id).map(x=>x.resource_id);
      const phases = phasesRows.filter(x=>x.project_id===p.id).map(x=>({id:x.id, name:x.name, orderIndex:x.order_index||0}));
      const knowledge = knowledgeAllRows.filter(k=>k.project_id===p.id).map(k=>({id:k.id, title:k.title, content:k.content, source:k.source||'manual'}));
      const steps = (tasksRows||[]).filter(x=>x.project_id===p.id).map(x=>({
        id:x.id, text:x.text, done:x.done, doneBy:x.done_by, doneAt: x.done_at ? new Date(x.done_at).getTime() : null,
        assignee:x.assignee||'', dueDate:x.due_date||'', instructions:x.instructions||'', statusNote:x.status_note||'', contextTag:x.context_tag||'',
        source:x.source||'manual', sourceResourceId:x.source_resource_id||null, triageStatus:x.triage_status||'new',
        createdAt: x.created_at ? new Date(x.created_at).getTime() : null,
        status: x.status || (x.done ? 'done' : 'todo'), phaseId: x.phase_id||null,
        blockedByTaskId: x.blocked_by_task_id||null, blockedByNote: x.blocked_by_note||'',
        canProceed: x.can_proceed!==undefined ? x.can_proceed : true, followUpDate: x.follow_up_date||''
      }));
      return {id:p.id, name:p.name, status:p.status, createdAt: new Date(p.created_at).getTime(), params, links, resourceIds, steps, phases, knowledge};
    });

    state.loadError = null;
  }catch(e){
    console.error('Failed to load from Supabase', e);
    state.loadError = e.message || String(e);
  }
  render();
}

function fmtTime(ts){
  const d = new Date(ts); const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  if(sameDay) return 'today '+time;
  const yest = new Date(now); yest.setDate(now.getDate()-1);
  if(d.toDateString() === yest.toDateString()) return 'yest '+time;
  return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + time;
}
function fmtDate(ts){ return new Date(ts).toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'}); }
function fmtDueDate(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
}

function tiltFor(id){ let h=0; for(const c of id) h+=c.charCodeAt(0); return ((h%5)-2)+'deg'; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function resourceLabel(r){ return RESOURCE_TYPES.find(t=>t.key===r.type)?.label || r.type; }

function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function startOfWeek(d){ const day=(d.getDay()+6)%7; const s=startOfDay(d); s.setDate(s.getDate()-day); return s; }
function endOfWeek(d){ const s=startOfWeek(d); const e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999); return e; }

async function applyAiUpdate(projectId, text){
  if(!text || !text.trim()) return;
  state.updateInFlight = true; render();
  try{
    const res = await fetch(APPLY_UPDATE_URL, {
      method:'POST',
      headers: {'Content-Type':'application/json', 'x-update-secret': UPDATE_SECRET},
      body: JSON.stringify({ project_id: projectId, update_text: text.trim(), user: state.currentUser })
    });
    const data = await res.json();
    if(!res.ok || data.error){
      console.error('applyAiUpdate failed', data);
      state.oauthBanner = {kind:'bad', text:'Update failed: ' + (data.error || res.status)};
    } else {
      state.oauthBanner = {kind:'good', text: data.summary ? ('Updated: ' + data.summary) : 'Update applied.'};
    }
  }catch(e){
    console.error('applyAiUpdate exception', e);
    state.oauthBanner = {kind:'bad', text:'Could not reach the update function: ' + e.message};
  }
  state.updateInFlight = false;
  await loadAll();
}

async function markStep(projectId, stepId, done){
  const p = state.projects.find(p=>p.id===projectId); if(!p) return;
  const s = p.steps.find(s=>s.id===stepId); if(!s) return;
  s.done = done;
  s.status = done ? 'done' : 'todo';
  const patch = { done, status: s.status };
  if(done){ s.doneBy = state.currentUser; s.doneAt = Date.now(); patch.done_by = state.currentUser; patch.done_at = new Date(s.doneAt).toISOString(); }
  else { s.doneBy = null; s.doneAt = null; patch.done_by = null; patch.done_at = null; }
  render();
  addUpdate(projectId, (done?'Marked done: ':'Reopened: ')+s.text, 'manual', state.currentUser);
  try{ await sbUpdate('tasks', 'id=eq.'+stepId, patch); }catch(e){ console.error('markStep failed', e); }
}

    sbInsert('project_links', [{project_id:projectId, linked_project_id:otherId},{project_id:otherId, linked_project_id:projectId}]).catch(e=> console.error('link failed', e));

    const [row] = await sbInsert('projects', [{name: name.trim(), status: status||'active'}]);
    const id = row.id;
    const steps = [];

function fmtAgo(ts){
  if(!ts) return 'never checked';
  const diff = Date.now() - ts;
  const mins = Math.floor(diff/60000);
  if(mins < 1) return 'checked just now';
  if(mins < 60) return 'checked ' + mins + 'm ago';
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return 'checked ' + hrs + 'h ago';
  const days = Math.floor(hrs/24);
  return 'checked ' + days + 'd ago';
}
function nextPollCountdown(){
  const mailboxes = state.resources.filter(r=>r.type==='mailbox' && r.lastChecked);
  if(!mailboxes.length) return 'next check: waiting on first run';
  const mostRecent = Math.max(...mailboxes.map(r=>r.lastChecked));
  const nextAt = mostRecent + INGESTION_POLL_MINUTES*60000;
  const remaining = nextAt - Date.now();
  if(remaining <= 0) return 'next check: any moment now';
  const mins = Math.floor(remaining/60000);
  const secs = Math.floor((remaining%60000)/1000);
  return 'next check in ' + (mins>0 ? mins+'m ' : '') + secs + 's';
}

async function importProjectJSON(raw){
  let data;
  try{ data = JSON.parse(raw); }catch(e){ state.importError = 'That is not valid JSON — check for a missing comma or bracket.'; render(); return; }
  const items = Array.isArray(data) ? data : [data];
  const nameToId = {}; state.projects.forEach(p=> nameToId[p.name.toLowerCase()] = p.id);
  const resNameToId = {}; state.resources.forEach(r=> resNameToId[r.name.toLowerCase()] = r.id);
  for(const item of items){
    if(!item.name) continue;
    try{
      const [projRow] = await sbInsert('projects', [{name:item.name, status:item.status||'active'}]);
      const id = projRow.id;
      const stepsIn = (item.steps||[]).map(s=> typeof s==='string' ? {text:s} : s);
      let steps = [];
      if(stepsIn.length){
        const taskRows = stepsIn.map(s=>({
          project_id:id, text:s.text||'', done:!!s.done,
          done_by: s.done ? (s.doneBy||state.currentUser) : null,
          done_at: s.done ? new Date().toISOString() : null,
          assignee: s.assignee||null, due_date: s.dueDate||null,
          instructions: s.instructions||null, status_note: s.statusNote||null, context_tag: s.contextTag||null
        }));
        const inserted = await sbInsert('tasks', taskRows);
        steps = inserted.map(t=>({id:t.id, text:t.text, done:t.done, doneBy:t.done_by, doneAt: t.done_at? new Date(t.done_at).getTime():null, assignee:t.assignee||'', dueDate:t.due_date||'', instructions:t.instructions||'', statusNote:t.status_note||'', contextTag:t.context_tag||'', status: t.status || (t.done?'done':'todo'), phaseId:null, blockedByTaskId:null, blockedByNote:'', canProceed:true, followUpDate:'', source:t.source||'manual', sourceResourceId:t.source_resource_id||null, triageStatus:'new', createdAt:Date.now()}));
      }
      const links = (item.links||[]).map(n=> nameToId[String(n).toLowerCase()]).filter(Boolean);
      if(links.length){
        const rows = []; links.forEach(lid=>{ rows.push({project_id:id, linked_project_id:lid}); rows.push({project_id:lid, linked_project_id:id}); });
        await sbInsert('project_links', rows);
        links.forEach(lid=>{ const op = state.projects.find(x=>x.id===lid); if(op) op.links.push(id); });
      }
      const resourceIds = (item.resourceIds||item.resources||[]).map(n=> resNameToId[String(n).toLowerCase()]).filter(Boolean);
      if(resourceIds.length) await sbInsert('project_resources', resourceIds.map(rid=>({project_id:id, resource_id:rid})));
      let params = [];
      if((item.params||[]).length){
        const inserted = await sbInsert('project_params', item.params.map(pr=>({project_id:id, key:pr.key||'', value:pr.value||''})));
        params = inserted.map(p=>({id:p.id, key:p.key||'', value:p.value||''}));
      }
      state.projects.push({id, name:item.name, status:item.status||'active', createdAt:Date.now(), steps, params, links, resourceIds, phases:[], knowledge:[]});
      nameToId[item.name.toLowerCase()] = id;
      addUpdate(id, 'Project imported.', 'manual', state.currentUser);
    }catch(e){
      console.error('import failed for', item.name, e);
      state.importError = 'Import failed for "' + item.name + '": ' + e.message;
    }
  }
  if(!state.importError){ state.showImport = false; state.importText = ''; }
  render();
}

function buildStepHelpPrompt(p, s){

  lines.push('I want focused help on ONE step from my "' + p.name + '" project tracker (a system called Organiser, backed by a live Supabase database). Please help me think through and complete this specific step — the rest of the project doesn\'t need discussing unless it becomes relevant.');
  lines.push('');
  lines.push('PROJECT: ' + p.name + ' (status: ' + p.status + ')');
  if(phase) lines.push('PHASE: ' + phase.name);
  lines.push('');
  lines.push('THE STEP: ' + s.text);
  lines.push('Status: ' + (STATUS_META[s.status] ? STATUS_META[s.status].label : s.status));
  if(s.instructions) lines.push('Instructions: ' + s.instructions);
  if(s.statusNote) lines.push('Notes so far: ' + s.statusNote);
  if(s.blockedByNote) lines.push('Blocked by: ' + s.blockedByNote);
  if(s.dueDate) lines.push('Due: ' + s.dueDate);
  if(s.assignee) lines.push('Assigned to: ' + s.assignee);
  lines.push('');
  const relevantKnowledge = (p.knowledge||[]).concat(state.globalKnowledge||[]);
  if(relevantKnowledge.length){
    lines.push('RELEVANT KNOWLEDGE BASE:');
    relevantKnowledge.forEach(k=> lines.push('- ' + k.title + ': ' + k.content));
    lines.push('');
  }
  lines.push('When we land on an outcome, please update the live tracker if you have computer/bash tool access: POST to ' + APPLY_UPDATE_URL + ' with header "x-update-secret: ' + UPDATE_SECRET + '" and JSON body {"project_id":"' + p.id + '","update_text":"<what happened>","user":"<my name>"}. If you don\'t have that kind of access in this conversation, just tell me what to type back into the dashboard\'s "Tell it what you did" box myself.');
  return lines.join('\n');
}
function generateBrief(project){
  const p = project;
  const lines = [];
  lines.push('PROJECT: ' + p.name);
  lines.push('STATUS: ' + p.status.toUpperCase());
  lines.push('LAST UPDATED: ' + fmtDate(Date.now()));
  lines.push('');
  if(p.params.length){
    lines.push('PARAMETERS:');
    p.params.forEach(pr=>{ if(pr.key) lines.push('  - ' + pr.key + ': ' + (pr.value||'—')); });
    lines.push('');
  }
  const linkedProjects = p.links.map(id=>state.projects.find(x=>x.id===id)).filter(Boolean);
  const linkedResources = p.resourceIds.map(id=>state.resources.find(x=>x.id===id)).filter(Boolean);
  if(linkedProjects.length || linkedResources.length){
    lines.push('INTERDEPENDENCIES:');
    linkedProjects.forEach(lp=> lines.push('  - Linked project: ' + lp.name + ' (' + lp.status + ')'));
    linkedResources.forEach(r=> lines.push('  - Shared ' + resourceLabel(r).toLowerCase() + ': ' + r.name + (r.detail ? ' — ' + r.detail : '')));
    lines.push('');
  }
  if(p.knowledge.length || state.globalKnowledge.length){
    lines.push('KNOWLEDGE BASE:');
    p.knowledge.forEach(k=> lines.push('  - ' + k.title + ': ' + k.content));
    state.globalKnowledge.forEach(k=> lines.push('  - [general] ' + k.title + ': ' + k.content));
    lines.push('');
  }
  lines.push('STEPS:');
  p.steps.forEach(s=>{
    let line = '  [' + (s.done?'x':' ') + '] ' + s.text;
    if(s.assignee) line += '  (assigned: ' + s.assignee + ')';
    if(s.dueDate) line += '  (due: ' + fmtDueDate(s.dueDate) + ')';
    if(s.done && s.doneBy) line += '  — done by ' + s.doneBy + ', ' + fmtDate(s.doneAt);
    lines.push(line);
    if(s.instructions) lines.push('      instructions: ' + s.instructions);
    if(s.statusNote) lines.push('      status: ' + s.statusNote);
    if(s.contextTag) lines.push('      waiting for: ' + s.contextTag);
  });
  const openSteps = p.steps.filter(s=>!s.done);
  lines.push('');
  lines.push('NEXT ACTION: ' + (openSteps.length ? openSteps[0].text : 'none outstanding'));
  lines.push('');
  const recent = state.updates.filter(u=>u.projectId===p.id).slice(0,8);
  if(recent.length){
    lines.push('RECENT PROGRESS (most recent first):');
    recent.forEach(u=> lines.push('  - [' + fmtDate(u.ts) + '] ' + u.user + ': ' + u.text));
  }
  return lines.join('\n');
}

function allAssignees(){
  const set = new Set();
  state.users.forEach(u=> set.add(u));
  state.projects.forEach(p=> p.steps.forEach(s=>{ if(s.assignee) set.add(s.assignee); }));
  return Array.from(set).sort();
}

function groupStepsByPhase(steps, phases){
  const groups = [];
  phases.slice().sort((a,b)=>a.orderIndex-b.orderIndex).forEach(ph=>{
    const items = steps.filter(s=>s.phaseId===ph.id);
    if(items.length) groups.push({label: ph.name, id: ph.id, items});
  });
  const noPhase = steps.filter(s=> !s.phaseId || !phases.some(ph=>ph.id===s.phaseId));
  if(noPhase.length) groups.push({label: phases.length ? 'No phase' : null, id: null, items: noPhase});
  return groups;
}

      ${sorted.length ? `

  let overlay = '';

          ${manualGroups.length ? manualGroups.map(g=>`
            ${g.label ? `<div class="tk-phase-header" style="${g.id?'border-left-color:'+phaseColor(g.id)+';color:'+phaseColor(g.id)+';':''}">${escapeHtml(g.label)}</div>` : ''}
            ${g.items.map(s=>`
              <div class="tk-action-row" style="${s.done?'opacity:0.55;':''}">
                <span class="tk-plan-num">${s._num}</span>
                <div class="tk-check ${s.done?'done':''}" data-proj="${p.id}" data-step="${s.id}"></div>
                <div>
                  <div class="tk-action-text" style="${s.done?'color:var(--muted);text-decoration:line-through;':''}">${escapeHtml(s.text)}${statusBadge(s)}${s.assignee?`<span class="tk-action-assignee">${escapeHtml(s.assignee)}</span>`:''}${s.dueDate?`<span class="tk-action-due">due ${fmtDueDate(s.dueDate)}</span>`:''}${s.source==='email'?`<span class="tk-mbx-badge" style="${s.sourceResourceId?'border-color:'+mailboxColor(s.sourceResourceId)+';color:'+mailboxColor(s.sourceResourceId)+';':''}">email</span>`:''}</div>
                  ${!s.done && s.statusNote?`<div class="tk-step-meta">${escapeHtml(s.statusNote).replace(/\n/g,'<br>')}</div>`:''}
                  ${s.done && s.doneBy?`<div class="tk-step-meta">done by ${escapeHtml(s.doneBy)}${s.doneAt?' · '+fmtDate(s.doneAt):''}</div>`:''}
                  ${!s.done ? blockedHint(s) : ''}
                  ${!s.done ? `<button class="tk-btn ghost small" data-help-step="${s.id}" style="margin-top:5px;">Help me with this</button>` : ''}
                </div>
              </div>
            `).join('')}
          `).join('') : `<div class="tk-empty">No steps yet.</div>`}
        </div>

        ${linkedMailboxes.length ? `
        <div class="tk-box">
          <div class="tk-box-title">Mailbox activity</div>
          ${linkedMailboxes.map(r=>`
            <div class="tk-mbx-activity-row">
              <span style="display:inline-block;width:10px;height:10px;flex:0 0 10px;background:${mailboxColor(r.id)};border-radius:2px;"></span>
              <span style="flex:1;">${escapeHtml(r.name)}</span>
              <span style="color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;">${escapeHtml(fmtAgo(r.lastChecked))}</span>
            </div>
          `).join('')}
        </div>` : ''}

        <div class="tk-box">
          <div class="tk-box-title">Ledger</div>
          ${projUpdates.length ? projUpdates.slice(0,15).map(u=>renderLedgerEntry(u,false)).join('') : `<div class="tk-empty">No entries yet.</div>`}
        </div>

        <div class="tk-box">
          <div class="tk-box-title">AI context brief <span style="font-weight:400;font-family:'Inter',sans-serif;font-size:11px;">paste into any Claude chat</span></div>
          <div class="tk-brief-box">${escapeHtml(brief)}</div>
          <div style="margin-top:8px;"><button class="tk-btn ghost small" id="tk-copy-brief">Copy brief</button>${state.justCopied ? '<span class="tk-copied">Copied</span>' : ''}</div>
        </div>
      `;

      const settingsContent = `
            <div class="tk-status-row">
              <span class="tk-user-label">status</span>
              <select class="tk-select" id="tk-status-select">
                <option value="active" ${p.status==='active'?'selected':''}>Active</option>
                <option value="waiting" ${p.status==='waiting'?'selected':''}>Waiting</option>
                <option value="done" ${p.status==='done'?'selected':''}>Done</option>
              </select>
              <span style="flex:1;"></span>
              ${state.confirmDeleteProject ? `
                <span style="font-size:12px;color:var(--rust);">Delete this project and all its tasks/updates?</span>
                <button class="tk-btn ghost small" id="tk-delete-cancel">Cancel</button>
                <button class="tk-btn danger small" id="tk-delete-confirm">Confirm delete</button>
              ` : `<button class="tk-btn ghost small" id="tk-delete-project" style="color:var(--rust);border-color:var(--rust);">Delete project</button>`}
            </div>

            <div class="tk-section-label">Parameters</div>
            ${p.params.map(pr=>`
              <div class="tk-param-row">
                <input class="tk-input" data-param-key="${pr.id}" placeholder="Key" value="${escapeHtml(pr.key)}" />
                <input class="tk-input" data-param-value="${pr.id}" placeholder="Value" value="${escapeHtml(pr.value)}" />
                <span class="rm" data-rm-param="${pr.id}">&times;</span>
              </div>
            `).join('')}
            <button class="tk-btn ghost small" id="tk-add-param">+ Add parameter</button>

            <div class="tk-section-label" style="margin-top:20px;">Linked projects <span style="font-weight:400;">(shares context/interdependencies)</span></div>
            <div>
              ${p.links.map(lid=>{ const lp=state.projects.find(x=>x.id===lid); if(!lp) return ''; return `<span class="tk-chip">${escapeHtml(lp.name)}<span class="x" data-unlink="${lid}">&times;</span></span>`; }).join('') || '<span class="tk-empty" style="padding:0;">None linked</span>'}
            </div>
            <div class="tk-chip-add">
              ${otherProjects.filter(op=>!p.links.includes(op.id)).map(op=>`<span class="tk-chip-choice" data-link="${op.id}">+ ${escapeHtml(op.name)}</span>`).join('')}
            </div>

            <div class="tk-section-label" style="margin-top:20px;">Shared resources</div>
            <div>
              ${p.resourceIds.map(rid=>{ const r=state.resources.find(x=>x.id===rid); if(!r) return ''; return `<span class="tk-chip">${escapeHtml(r.name)}<span class="x" data-unresource="${rid}">&times;</span></span>`; }).join('') || '<span class="tk-empty" style="padding:0;">None linked</span>'}
            </div>
            <div class="tk-chip-add">
              ${state.resources.filter(r=>!p.resourceIds.includes(r.id)).map(r=>`<span class="tk-chip-choice" data-resource="${r.id}">+ ${escapeHtml(r.name)}</span>`).join('')}
            </div>

            <div class="tk-section-label" style="margin-top:20px;">Phases <span style="font-weight:400;">(group steps into stages, like MedCore's tracker)</span></div>
            ${p.phases.map(ph=>`
              <div class="tk-param-row">
                <input class="tk-input" style="flex:1;" data-rename-phase="${ph.id}" value="${escapeHtml(ph.name)}" />
                <span class="rm" data-del-phase="${ph.id}">&times;</span>
              </div>
            `).join('')}
            <div class="tk-addstep">
              <input class="tk-input" id="tk-addphase-input" placeholder="New phase name…" />
              <button class="tk-btn ghost small" id="tk-addphase-btn">Add phase</button>
            </div>

            <div class="tk-section-label" style="margin-top:20px;">Steps <span style="font-weight:400;">(full detail — instructions, status notes, handoff tags)</span></div>
            ${p.steps.map(s=>`
              <div class="tk-step-row">
                <div class="tk-check ${s.done?'done':''}" data-detail-step="${s.id}"></div>
                <div style="flex:1;">
                  <div class="tk-step-text ${s.done?'done':''}">${escapeHtml(s.text)}${s.source==='email'?`<span class="tk-mbx-badge" title="${escapeHtml(state.resources.find(r=>r.id===s.sourceResourceId)?.name||'')}" style="${s.sourceResourceId?'border-color:'+mailboxColor(s.sourceResourceId)+';color:'+mailboxColor(s.sourceResourceId)+';':''}">via email${s.sourceResourceId?' — '+escapeHtml(state.resources.find(r=>r.id===s.sourceResourceId)?.name||''):''}</span>`:''}</div>
                  ${s.done && s.doneBy ? `<div class="tk-step-meta">done by ${escapeHtml(s.doneBy)} · ${fmtTime(s.doneAt)}</div>` : ''}
                  <div class="tk-step-inline">
                    <select class="tk-select" style="font-size:11px;padding:4px 6px;" data-phase-step="${s.id}">
                      <option value="">No phase</option>
                      ${p.phases.map(ph=>`<option value="${ph.id}" ${s.phaseId===ph.id?'selected':''}>${escapeHtml(ph.name)}</option>`).join('')}
                    </select>
                    <select class="tk-select" style="font-size:11px;padding:4px 6px;color:${STATUS_META[s.status]?.color||'inherit'};" data-status-step="${s.id}">
                      ${Object.entries(STATUS_META).map(([val,meta])=>`<option value="${val}" ${s.status===val?'selected':''}>${meta.label}</option>`).join('')}
                    </select>
                    <input class="tk-input" data-assignee-step="${s.id}" placeholder="Assignee" value="${escapeHtml(s.assignee||'')}" />
                    <input class="tk-date" type="date" data-due-step="${s.id}" value="${escapeHtml(s.dueDate||'')}" title="Due date" />
                  </div>
                  <div class="tk-step-inline">
                    <input class="tk-input" style="width:100%;" data-instructions-step="${s.id}" placeholder="Instructions — what they need to do" value="${escapeHtml(s.instructions||'')}" />
                  </div>
                  <div class="tk-step-inline">
                    <input class="tk-input" style="width:100%;" data-statusnote-step="${s.id}" placeholder="Status / next action — e.g. pending ABR login" value="${escapeHtml(s.statusNote||'')}" />
                  </div>
                  <div class="tk-step-inline">
                    <select class="tk-select" style="font-size:11px;padding:4px 6px;" data-blockedby-step="${s.id}">
                      <option value="">Not blocked by another step</option>
                      ${p.steps.filter(o=>o.id!==s.id).map(o=>`<option value="${o.id}" ${s.blockedByTaskId===o.id?'selected':''}>Blocked by: ${escapeHtml(o.text.slice(0,40))}</option>`).join('')}
                    </select>
                    <input class="tk-date" type="date" data-followup-step="${s.id}" value="${escapeHtml(s.followUpDate||'')}" title="Follow up / chase date" />
                    <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);"><input type="checkbox" data-canproceed-step="${s.id}" ${s.canProceed?'checked':''} /> can proceed now</label>
                  </div>
                  <div class="tk-step-inline">
                    <input class="tk-input" style="width:100%;" data-blockednote-step="${s.id}" placeholder="What's actually blocking this — e.g. waiting on Phillip's ABR access" value="${escapeHtml(s.blockedByNote||'')}" />
                  </div>
                  <div class="tk-step-inline">
                    <input class="tk-input" style="width:100%;" data-contexttag-step="${s.id}" placeholder="Handoff tag — e.g. When Phillip is in the office" value="${escapeHtml(s.contextTag||'')}" />
                  </div>
                </div>
              </div>
            `).join('')}
            <div class="tk-addstep">
              <input class="tk-input" id="tk-addstep-input" placeholder="Add a step…" />
              <input class="tk-input tk-assignee" id="tk-addstep-assignee" placeholder="Assignee" />
              <input class="tk-date" type="date" id="tk-addstep-due" />
              <button class="tk-btn ghost small" id="tk-addstep-btn">Add</button>
            </div>

            <div class="tk-note">To log progress, use "Tell it what you did" on the Plan view — this Settings screen is just for structure: renaming, deleting, linking, and per-step detail you rarely touch once set up.</div>
      `;

      overlay = `
        <div class="tk-overlay" id="tk-panel-overlay">
          <div class="tk-panel" id="tk-panel-inner">
            <div class="tk-panel-head">
              <div class="tk-panel-title">
                <span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${projectColor(p.id)};margin-right:9px;vertical-align:middle;flex:0 0 11px;"></span>
                <input class="tk-panel-title-input" data-rename-project="${p.id}" value="${escapeHtml(p.name)}" />
              </div>
              <button class="tk-settings-link" id="tk-panel-settings-link" title="Rename, delete, linking, per-step detail — set-up stuff you rarely need day to day">${state.projectPanelTab==='settings' ? '← Back to plan' : '⚙ Settings'}</button>
              <button class="tk-close" id="tk-panel-close">&times;</button>
            </div>
            ${state.projectPanelTab==='summary' ? summaryContent : settingsContent}
          </div>
        </div>`;
    }
  }

  let newProjectModal = '';
  if(state.showNewProject){
    newProjectModal = `
      <div class="tk-modal" id="tk-newproj-overlay">
        <div class="tk-modal-box">
          <h3>New project</h3>
          <div class="tk-field"><label>Name</label><input class="tk-input" id="tk-np-name" /></div>
          <div class="tk-field"><label>Status</label>
            <select class="tk-select" id="tk-np-status">
              <option value="active">Active</option><option value="waiting">Waiting</option><option value="done">Done</option>
            </select>
          </div>
          <div class="tk-field"><label>Steps (one per line)</label><textarea class="tk-textarea" id="tk-np-steps" style="min-height:80px;"></textarea></div>
          <div class="tk-field">
            <label>Link existing projects (shares interdependencies)</label>
            <div>${state.projects.map(p=>`<label style="display:flex;align-items:center;gap:6px;font-size:12.5px;margin-bottom:4px;"><input type="checkbox" class="tk-np-link" value="${p.id}" /> ${escapeHtml(p.name)}</label>`).join('') || '<span class="tk-empty" style="padding:0;">No other projects yet</span>'}</div>
          </div>
          <div class="tk-field">
            <label>Attach shared resources (mailboxes, guidelines, dates)</label>
            <div>${state.resources.map(r=>`<label style="display:flex;align-items:center;gap:6px;font-size:12.5px;margin-bottom:4px;"><input type="checkbox" class="tk-np-res" value="${r.id}" /> ${escapeHtml(r.name)} <span style="color:var(--muted);">(${resourceLabel(r)})</span></label>`).join('') || '<span class="tk-empty" style="padding:0;">No shared resources yet</span>'}</div>
          </div>
          <div class="tk-modal-actions">
            <button class="tk-btn ghost small" id="tk-np-cancel">Cancel</button>
            <button class="tk-btn small" id="tk-np-create">Create</button>
          </div>
        </div>
      </div>`;
  }

  let newUserModal = '';
  if(state.showNewUser){
    newUserModal = `
      <div class="tk-modal" id="tk-newuser-overlay">
        <div class="tk-modal-box">
          <h3>Add person</h3>
          <div class="tk-field"><label>Name</label><input class="tk-input" id="tk-nu-name" /></div>
          <div class="tk-modal-actions">
            <button class="tk-btn ghost small" id="tk-nu-cancel">Cancel</button>
            <button class="tk-btn small" id="tk-nu-create">Add</button>
          </div>
        </div>
      </div>`;
  }

  let newResourceModal = '';
  if(state.showNewResource){
    newResourceModal = `
      <div class="tk-modal" id="tk-newres-overlay">
        <div class="tk-modal-box">
          <h3>New shared resource</h3>
          <div class="tk-field"><label>Type</label>
            <select class="tk-select" id="tk-nr-type">${RESOURCE_TYPES.map(t=>`<option value="${t.key}">${t.label}</option>`).join('')}</select>
          </div>
          <div class="tk-field"><label>Name</label><input class="tk-input" id="tk-nr-name" placeholder="e.g. billing@yourdomain.com" /></div>
          <div class="tk-field"><label>Detail (optional)</label><textarea class="tk-textarea" id="tk-nr-detail" style="min-height:60px;"></textarea></div>
          <div class="tk-modal-actions">
            <button class="tk-btn ghost small" id="tk-nr-cancel">Cancel</button>
            <button class="tk-btn small" id="tk-nr-create">Add</button>
          </div>
        </div>
      </div>`;
  }

  let importModal = '';
  if(state.showImport){
    importModal = `
      <div class="tk-modal" id="tk-import-overlay">
        <div class="tk-modal-box wide">
          <h3>Import project from JSON</h3>
          <p style="font-size:12px;color:var(--muted);margin:-4px 0 12px;">Ask Claude in chat to generate this JSON for a new project, then paste it here. Format: {"name","status","steps":[{"text","assignee","dueDate"}],"params":[{"key","value"}],"links":[project names],"resourceIds":[resource names]}</p>
          <div class="tk-field"><textarea class="tk-textarea" id="tk-import-text" style="min-height:160px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;">${escapeHtml(state.importText)}</textarea></div>
          ${state.importError ? `<div style="color:var(--rust);font-size:12px;margin-bottom:10px;">${escapeHtml(state.importError)}</div>` : ''}
          <div class="tk-modal-actions">
            <button class="tk-btn ghost small" id="tk-import-cancel">Cancel</button>
            <button class="tk-btn small" id="tk-import-create">Import</button>
          </div>
        </div>
      </div>`;
  }


  mount.innerHTML = `
    <div class="tk-app">
      ${topBar}
      ${banner}
      ${tabs}
      <div class="tk-content-row">
        ${sidebar}
        <div class="tk-body">
          ${quickLog}
          ${body}
        </div>
      </div>
    </div>
    ${overlay}
    ${newProjectModal}
    ${newUserModal}
    ${newResourceModal}
    ${importModal}
  `;

  attachHandlers();
}

function renderLedgerEntry(u, showProject){
  const proj = state.projects.find(p=>p.id===u.projectId);
  const mbxSwatch = u.sourceResourceId ? `<span style="display:inline-block;width:8px;height:8px;background:${mailboxColor(u.sourceResourceId)};margin-right:6px;vertical-align:middle;" title="Sourced from a connected mailbox"></span>` : '';
  return `
    <div class="tk-ledger-entry">
      <div class="tk-stamp ${u.type==='system'?'system':''}" style="--tilt:${tiltFor(u.id)}">${escapeHtml(initials(u.user))}<br/>${fmtTime(u.ts)}</div>
      <div style="flex:1;min-width:0;">
        <div class="tk-ledger-text">${mbxSwatch}${showProject && proj ? `<span class="tk-action-proj" data-open="${proj.id}" style="color:${projectColor(proj.id)};text-decoration-color:${projectColor(proj.id)};">${escapeHtml(proj.name)}</span>` : ''}${escapeHtml(u.text)}</div>
        <div class="tk-ledger-meta">${escapeHtml(u.user)}${u.type==='system'?' · automated':''}</div>
      </div>
      <button class="tk-ledger-del" data-del-update="${u.id}" title="Delete this entry">&times;</button>
    </div>`;
}

function attachHandlers(){
  const dismissBanner = document.getElementById('tk-dismiss-banner');
  if(dismissBanner) dismissBanner.addEventListener('click', ()=>{ state.oauthBanner = null; render(); });
  const userSel = document.getElementById('tk-user-select');
  if(userSel) userSel.addEventListener('change', e=>{
    if(e.target.value==='__new__'){ state.showNewUser = true; render(); return; }
    state.currentUser = e.target.value; persistCurrentUser(); render();
  });

  document.querySelectorAll('.tk-tab').forEach(el=> el.addEventListener('click', ()=>{ state.tab = el.dataset.tab; render(); }));

  const calFilter = document.getElementById('tk-cal-filter');
  if(calFilter) calFilter.addEventListener('change', e=>{ state.calFilter = e.target.value; render(); });
  const todayFilter = document.getElementById('tk-today-filter');
  if(todayFilter) todayFilter.addEventListener('change', e=>{ state.todayFilter = e.target.value; render(); });

  const qlBtn = document.getElementById('tk-quicklog-btn');
  if(qlBtn) qlBtn.addEventListener('click', ()=>{
    if(state.updateInFlight) return;
    const projId = document.getElementById('tk-quicklog-project').value;
    const text = document.getElementById('tk-quicklog-text').value;
    if(text.trim()) applyAiUpdate(projId, text);
  });
  const qlText = document.getElementById('tk-quicklog-text');
  if(qlText) qlText.addEventListener('keydown', e=>{ if(e.key==='Enter'){ document.getElementById('tk-quicklog-btn').click(); } });

  document.querySelectorAll('[data-proj][data-step]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const proj = el.dataset.proj, step = el.dataset.step;
      const p = state.projects.find(p=>p.id===proj); const s = p.steps.find(s=>s.id===step);
      markStep(proj, step, !s.done);
    });
  });

  document.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); state.confirmDeleteProject = false; state.projectPanelTab = 'summary'; state.openProjectId = el.dataset.open; render(); });
  });

  const newProjBtn = document.getElementById('tk-new-project');
  if(newProjBtn) newProjBtn.addEventListener('click', ()=>{ state.showNewProject = true; render(); });
  const newProjBtnSide = document.getElementById('tk-new-project-side');
  if(newProjBtnSide) newProjBtnSide.addEventListener('click', ()=>{ state.showNewProject = true; render(); });

  const importSide = document.getElementById('tk-import-side');
  if(importSide) importSide.addEventListener('click', ()=>{ state.showImport = true; render(); });
  const importBoard = document.getElementById('tk-import-board');
  if(importBoard) importBoard.addEventListener('click', ()=>{ state.showImport = true; render(); });

  const panelClose = document.getElementById('tk-panel-close');
  if(panelClose) panelClose.addEventListener('click', ()=>{ state.openProjectId = null; state.confirmDeleteProject = false; render(); });
  const panelOverlay = document.getElementById('tk-panel-overlay');
  if(panelOverlay) panelOverlay.addEventListener('click', (e)=>{ if(e.target.id==='tk-panel-overlay'){ state.openProjectId = null; state.confirmDeleteProject = false; render(); } });

  const settingsLink = document.getElementById('tk-panel-settings-link');
  if(settingsLink) settingsLink.addEventListener('click', ()=>{ state.projectPanelTab = state.projectPanelTab==='settings' ? 'summary' : 'settings'; render(); });

  document.querySelectorAll('[data-triage]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const val = el.dataset.triageVal;
      if(val==='waiting'){
        const p = state.projects.find(p=>p.id===state.openProjectId);
        const s = p.steps.find(x=>x.id===el.dataset.triage);
        updateTaskTriageStatus(state.openProjectId, el.dataset.triage, 'waiting', s.dueDate || new Date().toISOString().slice(0,10));
      } else {
        updateTaskTriageStatus(state.openProjectId, el.dataset.triage, val);
      }
    });
  });
  document.querySelectorAll('[data-triage-wait]').forEach(el=>{
    el.addEventListener('change', e=> updateTaskTriageStatus(state.openProjectId, el.dataset.triageWait, 'waiting', e.target.value));
  });

  const statusSel = document.getElementById('tk-status-select');
  if(statusSel) statusSel.addEventListener('change', e=>{ setProjectStatus(state.openProjectId, e.target.value); });

  const renameInput = document.querySelector('[data-rename-project]');
  if(renameInput){
    renameInput.addEventListener('change', e=> renameProject(renameInput.dataset.renameProject, e.target.value));
    renameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') renameInput.blur(); });
  }

  const deleteBtn = document.getElementById('tk-delete-project');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{ state.confirmDeleteProject = true; render(); });
  const deleteCancel = document.getElementById('tk-delete-cancel');
  if(deleteCancel) deleteCancel.addEventListener('click', ()=>{ state.confirmDeleteProject = false; render(); });
  const deleteConfirm = document.getElementById('tk-delete-confirm');
  if(deleteConfirm) deleteConfirm.addEventListener('click', ()=> deleteProject(state.openProjectId));

  document.querySelectorAll('[data-detail-step]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const p = state.projects.find(p=>p.id===state.openProjectId);
      const s = p.steps.find(s=>s.id===el.dataset.detailStep);
      markStep(state.openProjectId, s.id, !s.done);
    });
  });

  const addStepBtn = document.getElementById('tk-addstep-btn');
  if(addStepBtn) addStepBtn.addEventListener('click', ()=>{
    const text = document.getElementById('tk-addstep-input').value;
    const assignee = document.getElementById('tk-addstep-assignee').value;
    const due = document.getElementById('tk-addstep-due').value;
    addStep(state.openProjectId, text, assignee, due);
  });

  const detailUpdBtn = document.getElementById('tk-detail-update-btn');
  if(detailUpdBtn) detailUpdBtn.addEventListener('click', ()=>{
    if(state.updateInFlight) return;
    const ta = document.getElementById('tk-detail-update-text');
    if(ta.value.trim()) applyAiUpdate(state.openProjectId, ta.value);
  });

  const addParamBtn = document.getElementById('tk-add-param');
  if(addParamBtn) addParamBtn.addEventListener('click', ()=> addParam(state.openProjectId));

  document.querySelectorAll('[data-param-key]').forEach(el=> el.addEventListener('change', e=> updateParam(state.openProjectId, el.dataset.paramKey, 'key', e.target.value)));
  document.querySelectorAll('[data-param-value]').forEach(el=> el.addEventListener('change', e=> updateParam(state.openProjectId, el.dataset.paramValue, 'value', e.target.value)));
  document.querySelectorAll('[data-rm-param]').forEach(el=> el.addEventListener('click', ()=> removeParam(state.openProjectId, el.dataset.rmParam)));

  document.querySelectorAll('[data-assignee-step]').forEach(el=> el.addEventListener('change', e=> updateStepField(state.openProjectId, el.dataset.assigneeStep, 'assignee', e.target.value)));
  document.querySelectorAll('[data-due-step]').forEach(el=> el.addEventListener('change', e=> updateStepField(state.openProjectId, el.dataset.dueStep, 'dueDate', e.target.value)));
  document.querySelectorAll('[data-instructions-step]').forEach(el=> el.addEventListener('change', e=> updateStepField(state.openProjectId, el.dataset.instructionsStep, 'instructions', e.target.value)));
  document.querySelectorAll('[data-statusnote-step]').forEach(el=> el.addEventListener('change', e=> updateStepField(state.openProjectId, el.dataset.statusnoteStep, 'statusNote', e.target.value)));
  document.querySelectorAll('[data-contexttag-step]').forEach(el=> el.addEventListener('change', e=> updateStepField(state.openProjectId, el.dataset.contexttagStep, 'contextTag', e.target.value)));

  document.querySelectorAll('[data-phase-step]').forEach(el=> el.addEventListener('change', e=> updateTaskField2(state.openProjectId, el.dataset.phaseStep, 'phaseId', 'phase_id', e.target.value)));
  document.querySelectorAll('[data-status-step]').forEach(el=> el.addEventListener('change', e=> updateTaskStatus(state.openProjectId, el.dataset.statusStep, e.target.value)));
  document.querySelectorAll('[data-blockedby-step]').forEach(el=> el.addEventListener('change', e=> updateTaskField2(state.openProjectId, el.dataset.blockedbyStep, 'blockedByTaskId', 'blocked_by_task_id', e.target.value)));
  document.querySelectorAll('[data-blockednote-step]').forEach(el=> el.addEventListener('change', e=> updateTaskField2(state.openProjectId, el.dataset.blockednoteStep, 'blockedByNote', 'blocked_by_note', e.target.value)));
  document.querySelectorAll('[data-followup-step]').forEach(el=> el.addEventListener('change', e=> updateTaskField2(state.openProjectId, el.dataset.followupStep, 'followUpDate', 'follow_up_date', e.target.value)));
  document.querySelectorAll('[data-canproceed-step]').forEach(el=> el.addEventListener('change', e=> updateTaskField2(state.openProjectId, el.dataset.canproceedStep, 'canProceed', 'can_proceed', e.target.checked)));

  const addPhaseBtn = document.getElementById('tk-addphase-btn');
  if(addPhaseBtn) addPhaseBtn.addEventListener('click', ()=> addPhase(state.openProjectId, document.getElementById('tk-addphase-input').value));
  document.querySelectorAll('[data-rename-phase]').forEach(el=> el.addEventListener('change', e=> renamePhase(state.openProjectId, el.dataset.renamePhase, e.target.value)));
  document.querySelectorAll('[data-del-phase]').forEach(el=> el.addEventListener('click', ()=> deletePhase(state.openProjectId, el.dataset.delPhase)));

  const knAddBtn = document.getElementById('tk-kn-add');
  if(knAddBtn) knAddBtn.addEventListener('click', ()=>{
    addKnowledge(
      state.openProjectId,
      document.getElementById('tk-kn-title').value,
      document.getElementById('tk-kn-content').value,
      document.getElementById('tk-kn-general').checked
    );
  });
  document.querySelectorAll('[data-del-knowledge]').forEach(el=> el.addEventListener('click', ()=> deleteKnowledge(state.openProjectId, el.dataset.delKnowledge, el.dataset.knowledgeGeneral==='1')));
  document.querySelectorAll('[data-kn-title]').forEach(el=> el.addEventListener('change', e=> updateKnowledge(state.openProjectId, el.dataset.knTitle, el.dataset.knGeneral==='1', 'title', e.target.value)));
  document.querySelectorAll('[data-kn-content]').forEach(el=> el.addEventListener('change', e=> updateKnowledge(state.openProjectId, el.dataset.knContent, el.dataset.knGeneral==='1', 'content', e.target.value)));

  document.querySelectorAll('[data-unlink]').forEach(el=> el.addEventListener('click', ()=> toggleLink(state.openProjectId, el.dataset.unlink)));
  document.querySelectorAll('[data-link]').forEach(el=> el.addEventListener('click', ()=> toggleLink(state.openProjectId, el.dataset.link)));
  document.querySelectorAll('[data-unresource]').forEach(el=> el.addEventListener('click', ()=> toggleResource(state.openProjectId, el.dataset.unresource)));
  document.querySelectorAll('[data-resource]').forEach(el=> el.addEventListener('click', ()=> toggleResource(state.openProjectId, el.dataset.resource)));

  const copyBriefBtn = document.getElementById('tk-copy-brief');
  if(copyBriefBtn) copyBriefBtn.addEventListener('click', ()=>{
    const p = state.projects.find(p=>p.id===state.openProjectId);
    copyBrief(generateBrief(p));
  });

  document.querySelectorAll('[data-help-step]').forEach(el=> el.addEventListener('click', ()=>{
    const p = state.projects.find(p=>p.id===state.openProjectId);
    const s = p.steps.find(x=>x.id===el.dataset.helpStep);
    if(!p || !s) return;
    const text = buildStepHelpPrompt(p, s);
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>{
        state.oauthBanner = {kind:'good', text:'Step context copied — paste it into a new Claude chat to work through it separately.'};
        render();
      }).catch(()=>{});
    }
  }));

  const npCancel = document.getElementById('tk-np-cancel');
  if(npCancel) npCancel.addEventListener('click', ()=>{ state.showNewProject = false; render(); });
  const npCreate = document.getElementById('tk-np-create');
  if(npCreate) npCreate.addEventListener('click', ()=>{
    const name = document.getElementById('tk-np-name').value;
    const status = document.getElementById('tk-np-status').value;
    const steps = document.getElementById('tk-np-steps').value;
    const linkIds = Array.from(document.querySelectorAll('.tk-np-link:checked')).map(el=>el.value);
    const resIds = Array.from(document.querySelectorAll('.tk-np-res:checked')).map(el=>el.value);
    if(name.trim()) createProject(name, steps, status, linkIds, resIds);
  });
  const npOverlay = document.getElementById('tk-newproj-overlay');
  if(npOverlay) npOverlay.addEventListener('click', (e)=>{ if(e.target.id==='tk-newproj-overlay'){ state.showNewProject=false; render(); } });

  const nuCancel = document.getElementById('tk-nu-cancel');
  if(nuCancel) nuCancel.addEventListener('click', ()=>{ state.showNewUser = false; render(); });
  const nuCreate = document.getElementById('tk-nu-create');
  if(nuCreate) nuCreate.addEventListener('click', ()=>{ const name = document.getElementById('tk-nu-name').value; if(name.trim()) addUser(name); });
  const nuOverlay = document.getElementById('tk-newuser-overlay');
  if(nuOverlay) nuOverlay.addEventListener('click', (e)=>{ if(e.target.id==='tk-newuser-overlay'){ state.showNewUser=false; render(); } });

  const newResBtn = document.getElementById('tk-new-resource');
  if(newResBtn) newResBtn.addEventListener('click', ()=>{ state.showNewResource = true; render(); });
  const nrCancel = document.getElementById('tk-nr-cancel');
  if(nrCancel) nrCancel.addEventListener('click', ()=>{ state.showNewResource = false; render(); });
  const nrCreate = document.getElementById('tk-nr-create');
  if(nrCreate) nrCreate.addEventListener('click', ()=>{
    const type = document.getElementById('tk-nr-type').value;
    const name = document.getElementById('tk-nr-name').value;
    const detail = document.getElementById('tk-nr-detail').value;
    if(name.trim()) createResource(type, name, detail);
  });
  const nrOverlay = document.getElementById('tk-newres-overlay');
  if(nrOverlay) nrOverlay.addEventListener('click', (e)=>{ if(e.target.id==='tk-newres-overlay'){ state.showNewResource=false; render(); } });
  document.querySelectorAll('[data-del-res]').forEach(el=> el.addEventListener('click', ()=> deleteResource(el.dataset.delRes)));
  document.querySelectorAll('[data-connect-mbx]').forEach(el=> el.addEventListener('click', ()=> connectMailbox(el.dataset.connectMbx)));
  document.querySelectorAll('[data-del-update]').forEach(el=> el.addEventListener('click', ()=> deleteUpdate(el.dataset.delUpdate)));
  document.querySelectorAll('[data-invoice-status]').forEach(el=> el.addEventListener('change', e=> setInvoiceStatus(el.dataset.invoiceStatus, e.target.value)));
  document.querySelectorAll('[data-del-invoice]').forEach(el=> el.addEventListener('click', ()=> deleteInvoice(el.dataset.delInvoice)));
  const invAddBtn = document.getElementById('tk-inv-add');
  if(invAddBtn) invAddBtn.addEventListener('click', ()=>{
    addInvoice(
      document.getElementById('tk-inv-vendor').value,
      document.getElementById('tk-inv-amount').value,
      document.getElementById('tk-inv-currency').value,
      document.getElementById('tk-inv-due').value
    );
  });

  const impCancel = document.getElementById('tk-import-cancel');
  if(impCancel) impCancel.addEventListener('click', ()=>{ state.showImport = false; state.importError=''; render(); });
  const impCreate = document.getElementById('tk-import-create');
  if(impCreate) impCreate.addEventListener('click', ()=>{
    const text = document.getElementById('tk-import-text').value;
    state.importText = text;
    importProjectJSON(text);
  });
  const impOverlay = document.getElementById('tk-import-overlay');
  if(impOverlay) impOverlay.addEventListener('click', (e)=>{ if(e.target.id==='tk-import-overlay'){ state.showImport=false; render(); } });
}

function checkOAuthRedirectResult(){
  const params = new URLSearchParams(window.location.search);
  const status = params.get('mbx_status');
  if(!status) return;
  const detail = params.get('mbx_detail');
  if(status==='connected') state.oauthBanner = {kind:'good', text:'Mailbox connected successfully.'};
  else if(status==='denied') state.oauthBanner = {kind:'warn', text:'Consent was declined, so nothing was connected.'};
  else state.oauthBanner = {kind:'bad', text:'Something went wrong connecting that mailbox' + (detail ? (': ' + detail) : '.') };
  // clean the URL so refreshing doesn't re-show the banner
  const clean = window.location.pathname;
  window.history.replaceState({}, '', clean);
}

checkOAuthRedirectResult();
loadAll();
setInterval(()=>{ if(state.tab==='resources' || state.tab==='mailboxes') render(); }, 1000);
})();
</script>
